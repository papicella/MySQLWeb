<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>MySQL*Web - Indexes</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <th:block th:replace="prefs-config :: head"></th:block>

    <link rel="stylesheet" th:href="@{css/dark-theme.css(v=9)}" media="screen" />
    <script th:src="@{js/navbar.js}" type="text/javascript"></script>

    <script th:src="@{js/functions.js}" type="text/javascript"></script>
    <script th:src="@{js/interactive-table.js(v=2)}" type="text/javascript"></script>

    <script type="text/javascript">
        // <![CDATA[

        // js form validation stuff
        var confirmMsg  = 'Do you really want to ';
        // ]]>
    </script>

</head>
<body class="page-compact">

<div th:replace="navbar :: bar(false)"></div>
<div class="bs-example">
    <div class="page-header">
        <h1>MySQL*Web - <small>Indexes</small></h1>
    </div>
</div>

<div th:replace="nav-tabs :: tabs('indexes')"></div>

<div class="bs-example tables-page-main">
    <div class="alert alert-success fade in" th:if="${estimatedrecords != null and estimatedrecords > 0}">
        <a href="#" class="close">&times;</a>
        <strong>Success!</strong> Found <b th:text="${estimatedrecords}"></b> Index(es)
    </div>
    <div class="alert alert-info fade in" th:if="${estimatedrecords != null and estimatedrecords == 0}">
        <a href="#" class="close">&times;</a>
        <strong>Info!</strong> Found 0 Indexes
    </div>
    <form th:action="@{/indexes}" method="post" class="form tables-search-form">
        <input type="text" id="search" name="search" placeholder="Index Name" class="input tables-search-input" />
        <select id="selectedSchema" name="selectedSchema" class="input tables-search-schema">
            <option th:each="schema : ${schemas}"
                    th:value="${schema}"
                    th:text="${schema}"
                    th:selected="${schema == chosenSchema}"></option>
        </select>
        <button type="submit" class="user-badge tables-search-button" name="searchpressed" value="searchpressed">Search</button>
        <div id="table-controls-host" class="table-controls-host"></div>
    </form>
</div>

<div class="bs-example tables-results" th:if="${estimatedrecords > 0}">
    <div class="table-wrapper">
        <form th:action="@{/indexes}" method="post" name="tablesForm" id="tablesForm">
            <input type="hidden" name="selectedSchema" th:value="${chosenSchema}" />
            <table id="datatable-mysql"
                   data-controls-host="#table-controls-host"
                   class="table tables-main-table indexes-main-table">
                <thead>
                <tr>
                    <th style="text-align:center"></th>
                    <th style="text-align:center">Catalog</th>
                    <th style="text-align:center">Schema</th>
                    <th style="text-align:center">Table Name</th>
                    <th style="text-align:center">Index Name</th>
                    <th style="text-align:center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="index,iterStat : ${indexes}">
                    <td style="text-align:center">
                        <input type="checkbox"
                               name="selected_idx[]"
                               th:value="${index.indexName}"
                               th:id="'checkbox_tbl_' + ${iterStat.count} + ''" />
                    </td>
                    <td th:text="${index.catalog}" style="text-align:center"></td>
                    <td th:text="${index.schemaName}" style="text-align:center"></td>
                    <td th:text="${index.tableName}" style="text-align:center"></td>
                    <td th:text="${index.indexName}" style="text-align:center"></td>
                    <td style="text-align:center">
                        <div class="action-buttons">
                            <a class="user-badge"
                               th:href="@{/indexes(idxName=${index.indexName},idxAction='DROP',selectedSchema=${chosenSchema},tableName=${index.tableName})}"
                               th:data1="${index.indexName}"
                               th:onclick="'return confirmLink(this, \'Drop INDEX ' + this.getAttribute('data1') + '?\')'"
                               title="Drop Index">Drop</a>
                            <a class="user-badge"
                               th:href="@{/indexes(idxName=${index.indexName},tabName=${index.tableName},idxAction='STRUCTURE',selectedSchema=${chosenSchema})}"
                               title="Index Details">Details</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </form>
    </div>
</div>

<div class="bs-example" th:if="${result != null}">
    <div class="col">
        <div th:if="${#strings.contains(result.message, 'ERROR:')}">
            <div class="alert alert-danger fade in">
                <a href="#" class="close">&times;</a>
                <div>
                    <b>MySQL*Web&gt;</b> <span th:text="${result.command}" />
                </div>
            </div>
            <table class="table">
                <tr class="info">
                    <td th:text="${result.message}" style="text-align:left} " ></td>
                </tr>
            </table>
        </div>
        <div th:if="!${#strings.contains(result.message, 'ERROR:')}">
            <div class="alert alert-success fade in">
                <a href="#" class="close">&times;</a>
                <div>
                    <b>MySQL*Web&gt;</b> <span th:text="${result.command}" />
                </div>
            </div>
        </div>
    </div>
</div>

<div class="bs-example" th:if="${arrayresult != null}">
    <div class="col">
        <div th:each="result : ${arrayresult}">
            <div th:if="${#strings.contains(result.message, 'ERROR:')}">
                <div class="alert alert-danger fade in">
                    <a href="#" class="close">&times;</a>
                    <div>
                        <b>MySQL*Web&gt;</b> <span th:text="${result.command}" />
                    </div>
                </div>
                <table class="table">
                    <tr class="info">
                        <td style="text-align: right">Message:</td>
                        <td th:text="${result.message}" style="text-align:left} " ></td>
                    </tr>
                </table>
            </div>
            <div th:if="!${#strings.contains(result.message, 'ERROR:')}">
                <div class="alert alert-success fade in">
                    <a href="#" class="close">&times;</a>
                    <div>
                        <b>MySQL*Web&gt;</b> <span th:text="${result.command}" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="table-details-section" th:if="${indexStructure != null}">
    <div class="table-details-block">
        <h2 class="table-details-title"><span th:text="${indexname}" /> Index Details</h2>
        <table class="table table-details-table">
            <tbody>
            <th:block th:each="rows : ${indexStructure.rows}">
                <tr th:each="columnName : ${indexStructure.columnNames}">
                    <th scope="row" class="table-details-label" th:text="${columnName}"></th>
                    <td class="table-details-value" th:text="${rows.get(columnName)}"></td>
                </tr>
            </th:block>
            </tbody>
        </table>
    </div>
</div>

<div th:include="footer :: copy"></div>

</body>
</html>
