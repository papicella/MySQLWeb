<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MySQL*Web - JDBC Connections</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" th:href="@{css/dark-theme.css}" media="screen" />
    <script th:src="@{js/navbar.js}" type="text/javascript"></script>

    <link rel="stylesheet" 

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>

    <!-- Latest compiled and minified JavaScript -->

    <style>
    </style>
</head>
<body>

<div th:replace="navbar :: bar(false)"></div>
<div class="bs-example">
    <div class="page-header">
        <h1>MySQL*Web - <small>JDBC Connections</small></h1>
    </div>
</div>

<div th:replace="nav-tabs :: tabs('connections')"></div>
<div th:if="${saved != null}">
    <div class="alert alert-success fade in col-xs-12">
        <a href="#" class="close">&times;</a>
        <strong>Success!</strong> <span th:text="${saved}" />
    </div>
</div>

<div class="col">
    <div class="alert alert-success fade in">
        <a href="#" class="close">&times;</a>
        <strong>Success!</strong> Found <span th:text="${conmapsize}" /> JDBC Connections
    </div>
    <table class="table" id="table_results">
        <thead>
        <tr>
            <th style="text-align:center">No</th>
            <th style="text-align:center">Key</th>
            <th style="text-align:center">JDBC URL/Database Name</th>
            <th style="text-align:center">Username</th>
            <th style="text-align:center">Connected At</th>
            <th style="text-align:center">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item,iterStat : ${conmap}">
            <td style="text-align:center ">
                <span th:text="${iterStat.count}" />
            </td>
            <td style="text-align:center">
                <span th:text="${item.key}" />
            </td>
            <td style="text-align:center ">
                <span th:text="${item.value.url}"/>
            </td>
            <td style="text-align:center">
                <span th:text="${item.value.schema}" />
            </td>
            <td style="text-align:center">
                <span th:text="${item.value.connectedAt}" />
            </td>
            <td style="text-align:center">
                <div th:if="${item.key != session.user_key}">
                    <a th:href="@{/viewconmap(conMapAction='DELETE',key=${item.key})}">
                            <img src="images/b_drop.png"
                                 th:src="@{images/b_drop.png}"
                                 alt="Delete JDBC Connection"
                                 width="16" height="16"
                                 title="Delete JDBC Connection"
                                 border="0"/>
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="clearfix">
</div>

<div th:include="footer :: copy"></div>

</body>
</html>
