<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MySQL*Web - Login</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>

    <link rel="stylesheet" th:href="@{css/dark-theme.css}" media="screen" />
    <script th:src="@{js/navbar.js}" type="text/javascript"></script>


    <!-- Latest compiled and minified JavaScript -->
    <style>
    </style>
</head>
<body>
<div th:replace="navbar :: bar(true)"></div>
<div class="bs-example">
    <div class="page-header">
        <h1>MySQL*Web - <small>Login</small></h1>
    </div>
</div>

<div th:if="${loginerror != null}">
    <div class="alert alert-danger fade in">
        <a href="#" class="close">&times;</a>
        <strong>Error!</strong> <span th:text="${loginerror}" />
    </div>
</div>

<div class="bs-example">
    <div class="login-container">
        <form th:action="@{/login}" method="post" class="form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-group">
                    <span class="input-addon">👤</span>
                    <input type="text" class="input" id="username" name="username"
                           placeholder="Username" />
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <span class="input-addon">🔒</span>
                    <input type="password" class="input" id="password" name="password"
                           placeholder="Password" />
                </div>
            </div>
            <div class="form-group">
                <label for="url">Url</label>
                <div class="input-group">
                    <span class="input-addon">🔗</span>
                    <input type="text" class="input" id="url" name="url"
                           placeholder="MySQL JDBC Url" value="jdbc:mysql://localhost:3306/apples" />
                </div>
                <span class="help-block">Example: jdbc:mysql://localhost:3306/apples</span>
            </div>
            <div class="form-group button-group">
                <button type="submit" class="btn btn-primary">Login</button>
                <button type="reset" class="btn btn-primary">Reset</button>
            </div>
        </form>
    </div>
</div>

<div th:include="footer :: copy"></div>

</body>
</html>
