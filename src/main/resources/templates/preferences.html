<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MySQL*Web - Preferences Page</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>

    <link rel="stylesheet" th:href="@{css/dark-theme.css(v=10)}" media="screen" />
    <script th:src="@{js/navbar.js}" type="text/javascript"></script>
    <script th:src="@{js/functions.js}" type="text/javascript"></script>
</head>
<body class="page-compact">

<div th:replace="navbar :: bar(false)"></div>
<div class="bs-example">
    <div class="page-header">
        <h1>MySQL*Web - <small>Preferences</small></h1>
    </div>
</div>

<div th:replace="nav-tabs :: tabs('')"></div>

<div th:if="${success != null}" class="bs-example">
    <div class="alert alert-success fade in">
        <a href="#" class="close">&times;</a>
        <strong>Success!</strong> <span th:text="${success}"></span>
    </div>
</div>

<div class="bs-example">
    <div class="login-container prefs-form-container">
        <form th:action="@{/prefs}" method="post" class="form prefs-form">
            <div class="form-group">
                <label for="maxrecordsinsqlworksheet">Max Records in Worksheet</label>
                <div class="input-group">
                    <span class="input-addon">📊</span>
                    <input type="text" class="input" id="maxrecordsinsqlworksheet" name="maxrecordsinsqlworksheet"
                           th:value="${userPref.maxRecordsinSQLQueryWindow}" onkeyup="checkInput(this)"
                           placeholder="Max Records in SQL Worksheet" />
                </div>
            </div>
            <div class="form-group">
                <label for="historysize">History Size</label>
                <div class="input-group">
                    <span class="input-addon">📜</span>
                    <input type="text" class="input" id="historysize" name="historysize"
                           th:value="${userPref.historySize}" onkeyup="checkInput(this)"
                           placeholder="Size of SQL History List" />
                </div>
            </div>
            <div class="form-group">
                <label for="sampleDataSize">Table Data Viewer Size</label>
                <div class="input-group">
                    <span class="input-addon">👁</span>
                    <input type="text" class="input" id="sampleDataSize" name="sampleDataSize"
                           th:value="${userPref.sampleDataSize}"
                           placeholder="Sample size of Table Data Viewer" />
                </div>
            </div>
            <div class="form-group button-group">
                <button type="submit" class="btn btn-primary">Update Preferences</button>
                <button type="reset" class="btn btn-primary">Reset</button>
            </div>
        </form>
    </div>
</div>

<div th:include="footer :: copy"></div>

</body>
</html>
