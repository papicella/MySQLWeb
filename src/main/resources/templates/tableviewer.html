<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>MySQL*Web - Table Viewer</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" th:href="@{css/dark-theme.css}" media="screen" />
    <script th:src="@{js/navbar.js}" type="text/javascript"></script>
    <script th:src="@{js/functions.js}" type="text/javascript"></script>
    <script th:src="@{js/interactive-table.js}" type="text/javascript"></script>

    <script type="text/javascript">
        // <![CDATA[

        // js form validation stuff
        var confirmMsg  = 'Do you really want to ';
        // ]]>
    </script>

</head>
<body class="page-compact">

<div th:replace="navbar :: bar(false)"></div>
<div class="bs-example">
    <div class="page-header">
        <h1>MySQL*Web - <small><span th:text="${tablename}" /> Table Viewer</small></h1>
    </div>
</div>

<div th:replace="nav-tabs :: tabs('tables')"></div>

<div class="bs-example tables-page-main" th:if="${queryResults != null}">
    <div class="alert alert-info fade in" th:if="${queryResultsSize == 0}">
        <a href="#" class="close">&times;</a>
        <strong>Info!</strong> No Data Found
    </div>
    <div class="alert alert-success fade in" th:if="${queryResultsSize > 0}">
        <a href="#" class="close">&times;</a>
        <strong>Success!</strong> Showing <b th:text="${queryResultsSize}"></b> Sample Row(s)
    </div>
    <div class="form tables-search-form" th:if="${queryResultsSize > 0}">
        <div id="table-controls-host" class="table-controls-host"></div>
    </div>
</div>

<div class="bs-example tables-results" th:if="${queryResults != null and queryResultsSize > 0}">
    <div class="table-wrapper">
        <table id="datatable-mysql"
               data-controls-host="#table-controls-host"
               class="table variables-main-table">
            <thead>
            <tr>
                <th th:each="columnName : ${queryResults.columnNames}"
                    style="text-align:center"
                    th:text="${columnName}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="rows : ${queryResults.rows}">
                <td th:each="columnName : ${queryResults.columnNames}"
                    style="text-align:center"
                    th:text="${rows.get(columnName)}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="bs-example tables-viewer-panels">
    <div class="panel-group" id="accordion">
        <div class="panel">
            <div class="panel-heading">
                <h3 class="panel-title">
                    <a data-parent="#accordion" href="#collapseOne">
                        DDL [<span th:text="${tablename}" />]
                    </a>
                </h3>
            </div>
            <div id="collapseOne" class="panel-collapse collapse">
                <div class="panel-body">
                    <table class="table">
                        <tbody>
                        <tr>
                            <td>
                                <span th:text="${tableDDL}" />
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-heading">
                <h3 class="panel-title">
                    <a data-parent="#accordion" href="#collapseTwo">
                        DESCRIBE [<span th:text="${tablename}" />]
                    </a>
                </h3>
            </div>
            <div id="collapseTwo" class="panel-collapse collapse">
                <div class="panel-body">
                    <table class="table">
                        <thead>
                        <tr>
                            <th th:each="columnName : ${queryResultsDescribe.columnNames}"
                                style="text-align:center"
                                th:text="${columnName}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="rows : ${queryResultsDescribe.rows}">
                            <td th:each="columnName : ${queryResultsDescribe.columnNames}"
                                style="text-align:center"
                                th:text="${rows.get(columnName)}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-heading">
                <h4 class="panel-title">
                    <a data-parent="#accordion2" href="#collapseThree">
                        DETAILS [<span th:text="${tablename}" />]
                    </a>
                </h4>
            </div>
            <div id="collapseThree" class="panel-collapse collapse">
                <div class="panel-body">
                    <table class="table table-hover table-bordered table-condensed">
                        <thead>
                        <tr>
                            <th style="text-align:center">Column</th>
                            <th style="text-align:center">Data</th>
                        </tr>
                        </thead>
                        <tbody>
                        <div th:each="rows : ${tableDetails.rows}">
                            <div th:each="columnName : ${tableDetails.columnNames}">
                                <tr>
                                    <td style="text-align:right" th:text="${columnName}"></td>
                                    <td style="text-align:left" th:text="${rows.get(columnName)}"></td>
                                </tr>
                            </div>
                        </div>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-heading">
                <h4 class="panel-title">
                    <a data-parent="#accordion2" href="#collapseFour">
                        INDEXES [<span th:text="${tablename}" />]
                    </a>
                </h4>
            </div>
            <div id="collapseFour" class="panel-collapse collapse">
                <div class="panel-body">
                    <table class="table">
                        <thead>
                        <tr>
                            <th th:each="columnName : ${tableIndexes.columnNames}"
                                style="text-align:center"
                                th:text="${columnName}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="rows : ${tableIndexes.rows}">
                            <td th:each="columnName : ${tableIndexes.columnNames}"
                                style="text-align:left"
                                th:text="${rows.get(columnName)}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:include="footer :: copy"></div>

</body>
</html>
