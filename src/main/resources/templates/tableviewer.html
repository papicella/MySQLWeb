<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <title>MySQL*Web - Table Viewer</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" th:href="@{css/dark-theme.css}" media="screen" />
    <script th:src="@{js/navbar.js}" type="text/javascript"></script>

    <link rel="stylesheet" 

    <!-- Latest compiled and minified JavaScript -->

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>

    <script type="text/javascript" src="https://cdn.datatables.net/r/bs-3.3.5/jqc-1.11.3,dt-1.10.8/datatables.min.js"></script>

    <link href="https://cdn.datatables.net/plug-ins/1.10.7/integration/bootstrap/3/dataTables.bootstrap.css" rel="stylesheet" />
    <script src="https://cdn.datatables.net/1.10.7/js/jquery.dataTables.min.js"></script>

    <script th:src="@{js/functions.js}" type="text/javascript"></script>

    <script type="text/javascript" charset="utf-8">
        $(document).ready(function() {
            $('#datatable-mysql').DataTable();
        } );
    </script>

    <script type="text/javascript">
        // <![CDATA[

        // js form validation stuff
        var confirmMsg  = 'Do you really want to ';
        // ]]>
    </script>

    <style>
    </style>

</head>
<body>

<div th:replace="navbar :: bar(false)"></div>
<div class="bs-example">
    <div class="page-header">
        <h1>MySQL*Web - <small><span th:text="${tablename}" /> Table Viewer</small></h1>
    </div>
</div>

<div th:replace="nav-tabs :: tabs('tables')"></div>
<div class="col" th:if="${queryResults != null}">
    <h2>Sample Data</h2>
    <div class="alert alert-info fade in" th:if="${queryResultsSize == 0}">
        <a href="#" class="close">&times;</a>
        <strong>Info!</strong> No Data Found
    </div>
    <table id="datatable-mysql" class="table">
        <thead>
        <div th:each="columnName : ${queryResults.columnNames}">
            <th style="text-align:center"><span th:text="${columnName}"/></th>
        </div>
        </thead>
        <tbody>
        <div th:each="rows : ${queryResults.rows}">
            <tr>
                <div th:each="columnName : ${queryResults.columnNames}">
                    <td style="text-align:center"><span th:text="${rows.get(columnName)}"/></td>
                </div>
            </tr>
        </div>
        </tbody>
    </table>
    <br />
</div>

<div class="col">
    <div class="panel-group" id="accordion">
        <br />
        <div class="panel">
            <div class="panel-heading">
                <h3 class="panel-title">
                    <a data-parent="#accordion" href="#collapseOne">
                        DDL [<span th:text="${tablename}" />]
                    </a>
                </h3>
            </div>
            <div id="collapseOne" class="panel-collapse collapse">
                <div class="panel-body">
                    <table class="table">
                        <tbody>
                        <tr>
                            <td>
                                <span th:text="${tableDDL}" />
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-heading">
                <h3 class="panel-title">
                    <a data-parent="#accordion" href="#collapseTwo">
                        DESCRIBE [<span th:text="${tablename}" />]
                    </a>
                </h3>
            </div>
            <div id="collapseTwo" class="panel-collapse collapse">
                <div class="panel-body">
                    <table id="datatable-mysql" class="table">
                        <thead>
                        <div th:each="columnName : ${queryResultsDescribe.columnNames}">
                            <th style="text-align:center"><span th:text="${columnName}"/></th>
                        </div>
                        </thead>
                        <tbody>
                        <div th:each="rows : ${queryResultsDescribe.rows}">
                            <tr>
                                <div th:each="columnName : ${queryResultsDescribe.columnNames}">
                                    <td style="text-align:center"><span th:text="${rows.get(columnName)}"/></td>
                                </div>
                            </tr>
                        </div>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-heading">
                <h4 class="panel-title">
                    <a data-parent="#accordion2" href="#collapseThree">
                        DETAILS [<span th:text="${tablename}" />]
                    </a>
                </h4>
            </div>
            <div id="collapseThree" class="panel-collapse collapse">
                <div class="panel-body">
                    <table class="table table-hover table-bordered table-condensed">
                        <thead>
                        <th style="text-align:center">Column</th>
                        <th style="text-align:center">Data</th>
                        </thead>
                        <tbody>
                        <div th:each="rows : ${tableDetails.rows}">
                            <div th:each="columnName : ${tableDetails.columnNames}">
                                <tr>
                                    <td style="text-align:right"><span th:text="${columnName}"/></td>
                                    <td style="text-align:left"><span th:text="${rows.get(columnName)}"/></td>
                                </tr>
                            </div>
                        </div>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-heading">
                <h4 class="panel-title">
                    <a data-parent="#accordion2" href="#collapseFour">
                        INDEXES [<span th:text="${tablename}" />]
                    </a>
                </h4>
            </div>
            <div id="collapseFour" class="panel-collapse collapse">
                <div class="panel-body">
                    <table class="table">
                        <thead>
                        <div th:each="columnName : ${tableIndexes.columnNames}">
                            <th style="text-align:center"><span th:text="${columnName}"/></th>
                        </div>
                        </thead>
                        <tbody>
                        <div th:each="rows : ${tableIndexes.rows}">
                            <tr>
                                <div th:each="columnName : ${tableIndexes.columnNames}">
                                    <td style="text-align:left"><span th:text="${rows.get(columnName)}"/></td>
                                </div>
                            </tr>
                        </div>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:include="footer :: copy"></div>

</body>
</html>
